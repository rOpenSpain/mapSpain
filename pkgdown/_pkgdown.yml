home:
  title: |
    mapSpain | Administrative boundaries of Spain, including Autonomous
    Communities, provinces, municipalities and NUTS
  description: |
    Administrative boundaries of Spain at several levels (Autonomous
    Communities, provinces, municipalities and NUTS), based on GISCO from
    Eurostat and CartoBase ANE from Instituto Geográfico Nacional. It also
    provides a plugin for the leaflet package and tools to download and process
    static map tiles.

reference:
- title: Political and administrative boundaries
  desc: |
    These functions return <a href="https://CRAN.R-project.org/package=sf"
    class="external-link"><span class="pkg">sf</span></a> objects representing
    political and administrative boundaries.
- subtitle: CartoBase ANE (Atlas Nacional de España)
  description: |
    Datasets sourced from CartoBase ANE.
  contents:
  - has_concept("siane")
- subtitle: GISCO
  description: |
    Datasets sourced from GISCO and Eurostat.
  contents:
  - has_concept("gisco")
- subtitle: Additional boundary helpers
  contents:
  - has_concept("can_helpers")
  - esp_get_comarca
  - esp_get_hex_prov
  - esp_get_simpl
- title: Static map tiles and imagery
  desc: |
    Functions to return static map tiles or create an interactive <a
    href="https://CRAN.R-project.org/package=leaflet"
    class="external-link"><span class="pkg">leaflet</span></a> map.
  contents:
  - has_concept("images")
  - terra::plotRGB()
  - leaflet::addProviderTiles()
  - tidyterra::geom_spatraster_rgb()
- title: Natural features
  desc: |
    These functions return <a href="https://CRAN.R-project.org/package=sf"
    class="external-link"><span class="pkg">sf</span></a> objects with natural
    features.
  contents:
  - has_concept("natural")
- title: Transport infrastructure
  desc: |
    These functions return <a href="https://CRAN.R-project.org/package=sf"
    class="external-link"><span class="pkg">sf</span></a> objects with
    transport infrastructure features.
  contents:
  - has_concept("infrastructure")
- title: Cache management
  contents: has_concept("cache utilities")
- title: Dictionary
  desc: |
    Translate region names across languages and coding standards.
  contents:
  - has_concept("dictionary")
- title: Datasets
  desc: |
    Datasets included with <a href="https://CRAN.R-project.org/package=mapSpain"
    class="external-link"><span class="pkg">mapSpain</span></a>.
  contents:
  - has_concept("datasets")
- title: Geographic grids
  desc: |
    Geographic grids are agreed, defined and harmonized grid networks with
    standardized locations and grid cell sizes.
  contents:
  - has_concept("grids")
- title: About the package
  contents:
  - mapSpain-package

articles:
- title: All articles
  contents:
  - articles/working_imagery
  - articles/mapasesp
  - articles/regioncodes
- title: Internal articles
  contents:
  - imagery
