url: https://ropenspain.github.io/mapSpain

figures:
  dpi: 300
  fig.retina: 2

development:
  mode: auto

template:
  bootstrap: 5
  package: rostemplate
  params:
    ganalytics: G-5N21Z0YYJJ
  opengraph:
    twitter:
      creator: "@dhernangomez"
      site: "@rOpenSpain"
      card: summary_large_image

authors:
  Diego Hernangómez:
    href: https://dieghernan.github.io/
  Eurostat:
    href: https://ec.europa.eu/eurostat
  Instituto Geográfico Nacional:
    href: https://www.ign.es/
  Francisco J. Goerlich:
    href: https://www.uv.es/goerlich/

navbar:
  structure:
    right:
    - search
    - twitter
    - github
    - lightswitch
  components:
    twitter:
      icon: fa-twitter
      href: http://twitter.com/dhernangomez
      aria-label: Twitter

home:
  title: |
    mapSpain | Administrative boundaries and static map tiles for Spain
  description: |
    Administrative boundaries of Spain at several levels (Autonomous
    Communities and Cities, provinces, municipalities and NUTS), based on GISCO
    from Eurostat and CartoBase ANE from Instituto Geográfico Nacional.
    Includes tools to download and process static map tiles and a leaflet
    plugin for Spanish public administration tile providers.

reference:
- title: Political and administrative boundary datasets
  desc: >
    Functions that return [`sf`](https://CRAN.R-project.org/package=sf)
    objects representing political and administrative boundaries.
- subtitle: CartoBase ANE (Atlas Nacional de España)
- contents:
  - has_concept("siane")
- subtitle: GISCO and Eurostat
- contents:
  - has_concept("gisco")
- subtitle: Other boundary datasets and representations
- contents:
  - has_concept("boundary_helpers")

- title: Natural features
  desc: >
    Functions that return `sf` objects representing terrain, inland waters
    and other natural features.
- contents:
  - has_concept("natural")

- title: Transport infrastructure
  desc: >
    Functions that return `sf` objects representing roads, railways and
    stations.
- contents:
  - has_concept("infrastructure")

- title: Geographical grids
  desc: >
    Functions that provide standardized geographical grids from Spanish and
    European public institutions.
- contents:
  - has_concept("grids")

- title: Static map tiles and imagery
  desc: >
    Functions for downloading static map tiles and adding Spanish public
    administration basemaps to interactive
    [`leaflet`](https://CRAN.R-project.org/package=leaflet) maps.
- contents:
  - has_concept("images")
  - terra::plotRGB()
  - leaflet::addProviderTiles()
  - tidyterra::geom_spatraster_rgb()

- title: Spatial helpers
  desc: >
    Helpers for repositioning the Canary Islands and creating inset boxes.
- contents:
  - has_concept("can_helpers")

- title: Codes and translations
  desc: >
    Functions for converting Spanish subdivision identifiers and translating
    subdivision names.
- contents:
  - has_concept("dictionary")

- title: Cache management
- contents:
  - has_concept("cache utilities")

- title: Included datasets
  desc: Datasets distributed with mapSpain.
- contents:
  - has_concept("datasets")

- title: About mapSpain
- contents:
  - mapSpain-package

articles:
- title: Guides and appendices
  desc: >
    Practical guides and reference material that complement the package
    vignette.
  navbar: ~
  contents:
  - articles/working_imagery
  - articles/regioncodes
- title: Talks and presentations
  navbar: Talks
  desc: >
    Materials from the Grupo de Usuarios R Madrid session held on
    25 November 2021.
  contents:
  - articles/maps_spain
  - madrid-r-slides
  - madrid-r-video

- title: internal
  contents:
  - imagery

external-articles:
- name: madrid-r-slides
  title: |
    mapSpain: mapas de España en R (slides)
  description: |
    Slides from the Grupo de Usuarios R Madrid talk held on 25 November 2021.
  href: https://dieghernan.github.io/rpubs/mapSpain_slides/
- name: madrid-r-video
  title: |
    Grupo de Usuarios R Madrid (video)
  description: |
