url: https://ropenspain.github.io/mapSpain

figures:
  dpi: 300
  fig.retina: 2

development:
  mode: auto

template:
  bootstrap: 5
  package: rostemplate
  params:
    ganalytics: G-5N21Z0YYJJ
  opengraph:
    twitter:
      creator: "@dhernangomez"
      site: "@rOpenSpain"
      card: summary_large_image

authors:
  Diego Hernangómez:
    href: https://dieghernan.github.io/
  Eurostat:
    href: https://ec.europa.eu/eurostat
  Instituto Geográfico Nacional:
    href: https://www.ign.es/
  Francisco J. Goerlich:
    href: https://www.uv.es/goerlich/

navbar:
  structure:
    right:
    - search
    - twitter
    - github
    - lightswitch
  components:
    twitter:
      icon: fa-twitter
      href: http://twitter.com/dhernangomez
      aria-label: Twitter

home:
  title: |
    mapSpain | Administrative boundaries and static map tiles for Spain
  description: |
    Administrative boundaries of Spain at several levels (Autonomous
    Communities and Cities, provinces, municipalities and NUTS), based on GISCO
    from Eurostat and CartoBase ANE from Instituto Geográfico Nacional.
    Includes tools to download and process static map tiles and a leaflet
    plugin for Spanish public administration tile providers.

reference:
- title: Political and administrative boundary datasets
  desc: |
    These functions return <a href="https://CRAN.R-project.org/package=sf"
    class="external-link"><span class="pkg">sf</span></a> objects representing
    political and administrative boundaries.
- subtitle: CartoBase ANE (Atlas Nacional de España)
  description: |
    Datasets sourced from CartoBase ANE.
  contents:
  - has_concept("siane")
- subtitle: GISCO
  description: |
    Datasets sourced from GISCO and Eurostat.
  contents:
  - has_concept("gisco")
- subtitle: Additional boundary helpers
  contents:
  - has_concept("can_helpers")
  - esp_get_comarca
  - esp_get_hex_prov
  - esp_get_simpl
- title: Static map tiles and imagery
  desc: |
    Functions that return static map tiles or add Spanish public administration
    basemaps to interactive <a
    href="https://CRAN.R-project.org/package=leaflet"
    class="external-link"><span class="pkg">leaflet</span></a> maps.
  contents:
  - has_concept("images")
  - terra::plotRGB()
  - leaflet::addProviderTiles()
  - tidyterra::geom_spatraster_rgb()
- title: Natural features
  desc: |
    These functions return <a href="https://CRAN.R-project.org/package=sf"
    class="external-link"><span class="pkg">sf</span></a> objects with natural
    features.
  contents:
  - has_concept("natural")
- title: Transport infrastructure
  desc: |
    These functions return <a href="https://CRAN.R-project.org/package=sf"
    class="external-link"><span class="pkg">sf</span></a> objects with
    transport infrastructure features.
  contents:
  - has_concept("infrastructure")
- title: Cache management
  contents: has_concept("cache utilities")
- title: Dictionary and translation helpers
  desc: |
    Translate Spanish subdivision names across languages and coding standards.
  contents:
  - has_concept("dictionary")
- title: Datasets
  desc: |
    Datasets included with <a href="https://CRAN.R-project.org/package=mapSpain"
    class="external-link"><span class="pkg">mapSpain</span></a>.
  contents:
  - has_concept("datasets")
- title: Geographical grid datasets
  desc: |
    Geographical grids are agreed, defined and harmonized grid networks with
    standardized locations and grid cell sizes.
  contents:
  - has_concept("grids")
- title: About the package
  contents:
  - mapSpain-package

articles:
- title: Guides and appendices
  desc: |
